name: Deploy

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

  deploy-scanner:
    runs-on: ubuntu-latest
    needs: verify
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_SCANNER_PROJECT_ID }}

    steps:
      - name: Check Vercel scanner secrets
        id: vercel
        shell: bash
        run: |
          if [[ -n "$VERCEL_TOKEN" && -n "$VERCEL_ORG_ID" && -n "$VERCEL_PROJECT_ID" ]]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "::error::Missing one or more Vercel scanner secrets (VERCEL_TOKEN, VERCEL_ORG_ID, VERCEL_SCANNER_PROJECT_ID)."
            exit 1
          fi

      - name: Checkout
        if: steps.vercel.outputs.ready == 'true'
        uses: actions/checkout@v4

      - name: Setup Node
        if: steps.vercel.outputs.ready == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install
        if: steps.vercel.outputs.ready == 'true'
        run: npm ci

      - name: Pull Vercel config
        if: steps.vercel.outputs.ready == 'true'
        working-directory: apps/scanner
        run: npx vercel pull --yes --environment=production --token="$env:VERCEL_TOKEN"
        shell: pwsh

      - name: Build scanner
        if: steps.vercel.outputs.ready == 'true'
        working-directory: apps/scanner
        run: npx vercel build --prod --token="$env:VERCEL_TOKEN"
        shell: pwsh

      - name: Deploy scanner
        if: steps.vercel.outputs.ready == 'true'
        working-directory: apps/scanner
        run: npx vercel deploy --prebuilt --prod --token="$env:VERCEL_TOKEN"
        shell: pwsh

  deploy-dashboard:
    runs-on: ubuntu-latest
    needs: verify
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_DASHBOARD_PROJECT_ID }}

    steps:
      - name: Check Vercel dashboard secrets
        id: vercel
        shell: bash
        run: |
          if [[ -n "$VERCEL_TOKEN" && -n "$VERCEL_ORG_ID" && -n "$VERCEL_PROJECT_ID" ]]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "::error::Missing one or more Vercel dashboard secrets (VERCEL_TOKEN, VERCEL_ORG_ID, VERCEL_DASHBOARD_PROJECT_ID)."
            exit 1
          fi

      - name: Checkout
        if: steps.vercel.outputs.ready == 'true'
        uses: actions/checkout@v4

      - name: Setup Node
        if: steps.vercel.outputs.ready == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install
        if: steps.vercel.outputs.ready == 'true'
        run: npm ci

      - name: Pull Vercel config
        if: steps.vercel.outputs.ready == 'true'
        working-directory: apps/dashboard
        run: npx vercel pull --yes --environment=production --token="$env:VERCEL_TOKEN"
        shell: pwsh

      - name: Build dashboard
        if: steps.vercel.outputs.ready == 'true'
        working-directory: apps/dashboard
        run: npx vercel build --prod --token="$env:VERCEL_TOKEN"
        shell: pwsh

      - name: Deploy dashboard
        if: steps.vercel.outputs.ready == 'true'
        working-directory: apps/dashboard
        run: npx vercel deploy --prebuilt --prod --token="$env:VERCEL_TOKEN"
        shell: pwsh

  deploy-api:
    runs-on: ubuntu-latest
    needs: verify
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_API_PROJECT_ID }}

    steps:
      - name: Check Vercel API secrets
        id: vercel
        shell: bash
        run: |
          if [[ -n "$VERCEL_TOKEN" && -n "$VERCEL_ORG_ID" && -n "$VERCEL_PROJECT_ID" ]]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "::error::Missing one or more Vercel API secrets (VERCEL_TOKEN, VERCEL_ORG_ID, VERCEL_API_PROJECT_ID)."
            exit 1
          fi

      - name: Checkout
        if: steps.vercel.outputs.ready == 'true'
        uses: actions/checkout@v4

      - name: Setup Node
        if: steps.vercel.outputs.ready == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install
        if: steps.vercel.outputs.ready == 'true'
        run: npm ci

      - name: Pull Vercel config
        if: steps.vercel.outputs.ready == 'true'
        working-directory: apps/api
        run: npx vercel pull --yes --environment=production --token="$env:VERCEL_TOKEN"
        shell: pwsh

      - name: Build API
        if: steps.vercel.outputs.ready == 'true'
        working-directory: apps/api
        run: npx vercel build --prod --token="$env:VERCEL_TOKEN"
        shell: pwsh

      - name: Deploy API
        if: steps.vercel.outputs.ready == 'true'
        working-directory: apps/api
        run: npx vercel deploy --prebuilt --prod --token="$env:VERCEL_TOKEN"
        shell: pwsh
