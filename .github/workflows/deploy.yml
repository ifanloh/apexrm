name: Deploy

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

  deploy-scanner:
    runs-on: ubuntu-latest
    needs: verify
    if: ${{ secrets.VERCEL_TOKEN != '' && secrets.VERCEL_ORG_ID != '' && secrets.VERCEL_SCANNER_PROJECT_ID != '' }}
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_SCANNER_PROJECT_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install
        run: npm ci

      - name: Pull Vercel config
        working-directory: apps/scanner
        run: npx vercel pull --yes --environment=production --token="$env:VERCEL_TOKEN"
        shell: pwsh

      - name: Build scanner
        working-directory: apps/scanner
        run: npx vercel build --prod --token="$env:VERCEL_TOKEN"
        shell: pwsh

      - name: Deploy scanner
        working-directory: apps/scanner
        run: npx vercel deploy --prebuilt --prod --token="$env:VERCEL_TOKEN"
        shell: pwsh

  deploy-dashboard:
    runs-on: ubuntu-latest
    needs: verify
    if: ${{ secrets.VERCEL_TOKEN != '' && secrets.VERCEL_ORG_ID != '' && secrets.VERCEL_DASHBOARD_PROJECT_ID != '' }}
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_DASHBOARD_PROJECT_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install
        run: npm ci

      - name: Pull Vercel config
        working-directory: apps/dashboard
        run: npx vercel pull --yes --environment=production --token="$env:VERCEL_TOKEN"
        shell: pwsh

      - name: Build dashboard
        working-directory: apps/dashboard
        run: npx vercel build --prod --token="$env:VERCEL_TOKEN"
        shell: pwsh

      - name: Deploy dashboard
        working-directory: apps/dashboard
        run: npx vercel deploy --prebuilt --prod --token="$env:VERCEL_TOKEN"
        shell: pwsh

  deploy-api:
    runs-on: ubuntu-latest
    needs: verify
    if: ${{ secrets.VERCEL_TOKEN != '' && secrets.VERCEL_ORG_ID != '' && secrets.VERCEL_API_PROJECT_ID != '' }}
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_API_PROJECT_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install
        run: npm ci

      - name: Pull Vercel config
        working-directory: apps/api
        run: npx vercel pull --yes --environment=production --token="$env:VERCEL_TOKEN"
        shell: pwsh

      - name: Deploy API
        working-directory: apps/api
        run: npx vercel deploy --prod --token="$env:VERCEL_TOKEN"
        shell: pwsh
